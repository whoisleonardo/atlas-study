# Runs on the VM (~/atlas). Lean stack for the 1 GB x86 micro:
# the API stores data in a file-based H2 DB (no Postgres container).
# Requires a .env file alongside this one (see .env.example).
services:
  app:
    image: ${APP_IMAGE:-ghcr.io/whoisleonardo/atlas-study:latest}
    restart: unless-stopped
    environment:
      # Default profile (H2). File-based so data survives restarts.
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/atlas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
      # Cap the JVM heap so it fits comfortably in 1 GB RAM + swap.
      JAVA_TOOL_OPTIONS: -Xmx384m
    volumes:
      - h2data:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  h2data:
  caddy_data:
  caddy_config:
