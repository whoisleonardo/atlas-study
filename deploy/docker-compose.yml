# Runs on the VM (~/atlas). Pulls the app image from GHCR; Caddy terminates HTTPS.
# Requires a .env file alongside this one (see .env.example).
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: estudos
      POSTGRES_USER: estudos
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estudos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-ghcr.io/whoisleonardo/atlas-study:latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://db:5432/estudos
      DB_USERNAME: estudos
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
