name: release-apk

# Push a tag like v1.0.0 to build a signed release APK on EAS and attach
# it to a GitHub Release. Requires the EXPO_TOKEN secret and a project that
# has been linked with `eas init` (extra.eas.projectId in app.json).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: estudos-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: estudos-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build signed APK on EAS
        run: |
          eas build --platform android --profile production-apk --non-interactive --json --wait > build.json
          APK_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl' build.json)
          echo "APK_URL=$APK_URL" >> "$GITHUB_ENV"

      - name: Download APK
        run: curl -L -o "atlas-${{ github.ref_name }}.apk" "$APK_URL"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: estudos-app/atlas-${{ github.ref_name }}.apk
