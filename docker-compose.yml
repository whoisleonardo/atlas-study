services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: estudos
      POSTGRES_USER: estudos
      POSTGRES_PASSWORD: estudos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estudos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./estudos-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/estudos
      SPRING_DATASOURCE_USERNAME: estudos
      SPRING_DATASOURCE_PASSWORD: estudos
    depends_on:
      db:
        condition: service_healthy

  # Expo / Metro não roda em Docker — inicie localmente:
  # cd estudos-app && npx expo start
  # Configure a URL da API no app: Settings → API URL → http://<seu-ip>:8080

volumes:
  pgdata:
